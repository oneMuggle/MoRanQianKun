name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts --no-fund --no-audit

      - name: Build Web App
        run: node node_modules/vite/bin/vite.js build
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}

      - name: Sync Capacitor
        run: node node_modules/@capacitor/cli/bin/capacitor sync android
        env:
          CI: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # 显式指定只安装构建 APK 必需的包（避免默认装 Android Emulator，
          # emulator 在 GitHub runner 上 zip 偶发损坏）。
          # action 接受空格分隔的单行字符串。
          # 不要装 'tools' 包——它依赖 Android Emulator，会触发 emulator 下载。
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v5
        with:
          name: moran-jianghu-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
