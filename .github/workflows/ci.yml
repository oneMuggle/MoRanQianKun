name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Bundle Size
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size (size-limit)
        run: npm run size

  vitest:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify vitest is installed
        run: |
          if [ ! -f "./node_modules/.bin/vitest" ]; then
            echo "vitest not found after npm ci, falling back to npm install"
            rm -rf node_modules
            npm install
          fi
          test -f "./node_modules/.bin/vitest" || (echo "vitest still not installed" && exit 1)

      - name: Run Vitest
        run: npx vitest --run --reporter=verbose

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: test-results/
          retention-days: 7

  playwright:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify dependencies installed
        run: |
          if [ ! -f "./node_modules/.bin/playwright" ]; then
            echo "playwright not found after npm ci, falling back to npm install"
            rm -rf node_modules
            npm install
          fi
          test -f "./node_modules/.bin/playwright" || (echo "playwright still not installed" && exit 1)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=line

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
