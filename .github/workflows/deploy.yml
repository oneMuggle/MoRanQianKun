name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create wrangler config
        run: |
          rm -f wrangler.toml
          cat > wrangler.toml << EOF
name = "wuxia-game"
compatibility_date = "2024-01-01"
account_id = "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

[site]
bucket = "./dist"
EOF

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 检查项目是否已存在，不存在则创建
          if npx wrangler pages project list 2>/dev/null | grep -qw "wuxia-game"; then
            echo "Project wuxia-game already exists"
          else
            npx wrangler pages project create wuxia-game --production-branch=main
          fi
          npx wrangler pages deploy dist --project-name=wuxia-game --commit-dirty=true