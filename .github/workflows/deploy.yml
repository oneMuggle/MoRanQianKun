name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create wrangler config
        run: |
          rm -f wrangler.toml
          printf 'name = "wuxia-game"\ncompatibility_date = "2024-01-01"\naccount_id = "%s"\n\n[site]\nbucket = "dist"\n' \
            "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" > wrangler.toml

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 项目不存在则创建
          npx wrangler pages project get wuxia-game 2>/dev/null || \
            npx wrangler pages project create wuxia-game --production-branch=main --yes
          npx wrangler pages deploy dist --project-name=wuxia-game